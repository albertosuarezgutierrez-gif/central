name: Deploy landing (ialimp.es)

# Despliega la landing estática `apps/ialimp/landing/ialimp-es/` al proyecto Vercel
# `ialimp-landing` (dominio ialimp.es), que NO está conectado a git por sí mismo.
# Se ejecuta al cambiar la landing en `main`, o a mano (workflow_dispatch).
#
# OJO monorepo: este workflow DEBE vivir en `.github/workflows/` de la RAÍZ del repo
# (GitHub Actions ignora los workflows anidados en subcarpetas como
# `apps/ialimp/.github/`). La fuente de la landing vive en `apps/ialimp/landing/ialimp-es/`.
#
# Requisito: el secreto del repo `VERCEL_TOKEN` debe estar en ESTE repo (ia.rest)
#   (GitHub → Settings → Secrets and variables → Actions → New repository secret).
#   El token se crea en Vercel → Account Settings → Tokens.
# Los IDs de equipo/proyecto NO son secretos (son identificadores), van fijos abajo.

on:
  push:
    branches: [main]
    paths:
      - 'apps/ialimp/landing/ialimp-es/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_f4gPpt6dPuNcd5YyMt3q27uf
      VERCEL_PROJECT_ID: prj_41U7iFmAbFStPBqfms1cuDpJB8y4
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Descargar fuentes (Nunito, auto-alojada)
        working-directory: apps/ialimp/landing/ialimp-es
        run: bash fetch-fonts.sh || echo "fetch-fonts falló; se despliega igual (fuente del sistema)"

      - name: Instalar Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy a producción (proyecto ialimp-landing)
        working-directory: apps/ialimp/landing/ialimp-es
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
