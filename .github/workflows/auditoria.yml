name: Auditoría de estructura

# Mantiene la radiografía del repo (apps/plataforma/lib/estructura.generated.json)
# SIEMPRE al día, sola: en cada push que toque la estructura, regenera el JSON y, si
# cambió, lo commitea de vuelta. El script es Node puro (no instala dependencias).
#
# Sin bucles: el commit lo hace github-actions[bot] con GITHUB_TOKEN (sus pushes no
# disparan workflows) y lleva [skip ci]; además el JSON conserva su timestamp si el
# contenido real no cambió, así que un push que no toca la estructura no genera commit.

on:
  push:
    branches: ['**']
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.claude/skills/**'
      - 'docs/CONTEXTO-SESIONES.md'
      - 'scripts/auditar-estructura.mjs'
      - '.github/workflows/auditoria.yml'

permissions:
  contents: write

concurrency:
  group: auditoria-${{ github.ref }}
  cancel-in-progress: false

jobs:
  radiografia:
    name: Radiografía al día
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerar radiografía
        run: node scripts/auditar-estructura.mjs

      - name: Commitear si cambió
        run: |
          FILES="apps/plataforma/lib/estructura.generated.json docs/ARQUITECTURA.generated.md"
          if [ -n "$(git status --porcelain $FILES)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add $FILES
            git commit -m 'chore(auditoría): regenerar radiografía de estructura [skip ci]'
            git push origin HEAD:${{ github.ref_name }}
            echo "Radiografía (JSON + markdown) actualizada y commiteada."
          else
            echo "Radiografía ya al día — sin cambios."
          fi
