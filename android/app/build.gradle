plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'es.iarest.app'
    compileSdk 34

    defaultConfig {
        applicationId "es.iarest.app"
        minSdk 26
        targetSdk 34
        versionCode 12
        versionName "3.0"
    }

    signingConfigs {
        release {
            storeFile file("iarest-release.keystore")
            storePassword "iarest2026"
            keyAlias "iarest"
            keyPassword "iarest2026"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug {
            applicationIdSuffix ""
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.media:media:1.7.0'
    implementation 'com.google.android.material:material:1.11.0'
}
