<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1200" height="780" fill="#ffffff"/>
  <text x="600" y="48" text-anchor="middle" font-size="30" font-weight="800" fill="#1e1b4b">El agregado «Encargo» une los módulos</text>
  <text x="600" y="80" text-anchor="middle" font-size="17" fill="#475569">Un mismo conjunto de capacidades sirve a evento, porte, alquiler o cita — solo cambia la piel</text>

  <!-- connectors (drawn first, under boxes) -->
  <g stroke="#c7d2fe" stroke-width="2.5" fill="none">
    <line x1="160" y1="215" x2="480" y2="345"/>
    <line x1="420" y1="215" x2="560" y2="345"/>
    <line x1="680" y1="215" x2="640" y2="345"/>
    <line x1="940" y1="215" x2="720" y2="345"/>
    <line x1="160" y1="585" x2="480" y2="455"/>
    <line x1="420" y1="585" x2="560" y2="455"/>
    <line x1="680" y1="585" x2="640" y2="455"/>
    <line x1="940" y1="585" x2="720" y2="455"/>
  </g>

  <!-- center: ENCARGO -->
  <rect x="450" y="345" width="300" height="110" rx="16" fill="#1e1b4b"/>
  <text x="600" y="392" text-anchor="middle" font-size="32" font-weight="800" fill="#ffffff">ENCARGO</text>
  <text x="600" y="422" text-anchor="middle" font-size="15" fill="#c7d2fe" font-family="Consolas, monospace">parent_id + parent_type</text>

  <!-- module boxes -->
  <!-- top row -->
  <g>
    <rect x="55" y="145" width="210" height="70" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="160" y="180" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1b4b">CRM / Leads</text>
    <text x="160" y="200" text-anchor="middle" font-size="12.5" fill="#6366f1" font-family="Consolas, monospace">module-crm</text>
  </g>
  <g>
    <rect x="315" y="145" width="210" height="70" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="420" y="180" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1b4b">Presupuestos</text>
    <text x="420" y="200" text-anchor="middle" font-size="12.5" fill="#6366f1" font-family="Consolas, monospace">module-presupuestos</text>
  </g>
  <g>
    <rect x="575" y="145" width="210" height="70" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="680" y="180" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1b4b">Agenda</text>
    <text x="680" y="200" text-anchor="middle" font-size="12.5" fill="#6366f1" font-family="Consolas, monospace">module-agenda</text>
  </g>
  <g>
    <rect x="835" y="145" width="210" height="70" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="940" y="180" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1b4b">Inventario</text>
    <text x="940" y="200" text-anchor="middle" font-size="12.5" fill="#6366f1" font-family="Consolas, monospace">module-inventario</text>
  </g>
  <!-- bottom row -->
  <g>
    <rect x="55" y="585" width="210" height="70" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="160" y="620" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1b4b">Proveedores</text>
    <text x="160" y="640" text-anchor="middle" font-size="12.5" fill="#6366f1" font-family="Consolas, monospace">module-proveedores</text>
  </g>
  <g>
    <rect x="315" y="585" width="210" height="70" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="420" y="620" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1b4b">Portales</text>
    <text x="420" y="640" text-anchor="middle" font-size="12.5" fill="#6366f1" font-family="Consolas, monospace">module-portales</text>
  </g>
  <g>
    <rect x="575" y="585" width="210" height="70" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="680" y="620" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1b4b">Feedback</text>
    <text x="680" y="640" text-anchor="middle" font-size="12.5" fill="#6366f1" font-family="Consolas, monospace">module-feedback</text>
  </g>
  <g>
    <rect x="835" y="585" width="210" height="70" rx="12" fill="#f1f5f9" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="940" y="620" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1b4b">Facturación</text>
    <text x="940" y="640" text-anchor="middle" font-size="12.5" fill="#0284c7" font-family="Consolas, monospace">core-fiscal</text>
  </g>

  <!-- tipo caption -->
  <rect x="270" y="700" width="660" height="44" rx="22" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="600" y="728" text-anchor="middle" font-size="16" fill="#1e1b4b"><tspan font-family="Consolas, monospace" fill="#4f46e5" font-weight="700">Encargo.tipo</tspan>  =  evento · porte · alquiler · cita_clínica · comanda …</text>
</svg>
