<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowI" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f46e5"/>
    </marker>
    <marker id="arrowE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1200" height="640" fill="#ffffff"/>
  <text x="600" y="48" text-anchor="middle" font-size="30" font-weight="800" fill="#1e1b4b">El gancho holding: operaciones intercompany consolidadas</text>
  <text x="600" y="80" text-anchor="middle" font-size="17" fill="#475569">Las sociedades se facturan entre sí; el cuadro de mando elimina lo interno para no inflar el grupo</text>

  <!-- arrows (under nodes) -->
  <g stroke-width="2.5" fill="none">
    <!-- internal: dashed indigo -->
    <line x1="320" y1="150" x2="520" y2="150" stroke="#4f46e5" stroke-dasharray="7 5" marker-end="url(#arrowI)"/>
    <line x1="320" y1="285" x2="520" y2="330" stroke="#4f46e5" stroke-dasharray="7 5" marker-end="url(#arrowI)"/>
    <line x1="320" y1="420" x2="520" y2="360" stroke="#4f46e5" stroke-dasharray="7 5" marker-end="url(#arrowI)"/>
    <!-- external: solid green -->
    <line x1="760" y1="345" x2="888" y2="345" stroke="#16a34a" marker-end="url(#arrowE)"/>
  </g>

  <!-- labels on arrows -->
  <text x="420" y="138" text-anchor="middle" font-size="13.5" fill="#4f46e5" font-weight="600">lotes de comida · interno</text>
  <text x="408" y="300" text-anchor="middle" font-size="13.5" fill="#4f46e5" font-weight="600">portes · interno</text>
  <text x="406" y="403" text-anchor="middle" font-size="13.5" fill="#4f46e5" font-weight="600">alquiler · interno</text>
  <text x="824" y="333" text-anchor="middle" font-size="13.5" fill="#16a34a" font-weight="600">factura · externo</text>

  <!-- source nodes (left) -->
  <g>
    <rect x="80" y="114" width="240" height="72" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="200" y="148" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1b4b">Cocina central</text>
    <text x="200" y="170" text-anchor="middle" font-size="12.5" fill="#64748b">sociedad</text>
  </g>
  <g>
    <rect x="80" y="249" width="240" height="72" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="200" y="283" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1b4b">Flota / Transporte</text>
    <text x="200" y="305" text-anchor="middle" font-size="12.5" fill="#64748b">sociedad</text>
  </g>
  <g>
    <rect x="80" y="384" width="240" height="72" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="200" y="418" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1b4b">Alquiler materiales</text>
    <text x="200" y="440" text-anchor="middle" font-size="12.5" fill="#64748b">sociedad</text>
  </g>

  <!-- target nodes -->
  <g>
    <rect x="520" y="114" width="240" height="72" rx="14" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="640" y="148" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1b4b">Tiendas para llevar</text>
    <text x="640" y="170" text-anchor="middle" font-size="12.5" fill="#64748b">sociedad/negocio</text>
  </g>
  <g>
    <rect x="520" y="309" width="240" height="72" rx="14" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="640" y="343" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1b4b">Catering / Eventos</text>
    <text x="640" y="365" text-anchor="middle" font-size="12.5" fill="#64748b">sociedad</text>
  </g>

  <!-- client -->
  <g>
    <rect x="888" y="309" width="224" height="72" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="1000" y="343" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">Cliente final</text>
    <text x="1000" y="365" text-anchor="middle" font-size="12.5" fill="#3f6212">externo al grupo</text>
  </g>

  <!-- consolidated bar -->
  <rect x="80" y="520" width="1032" height="84" rx="16" fill="#1e1b4b"/>
  <text x="596" y="553" text-anchor="middle" font-size="19" font-weight="800" fill="#ffffff">PLATAFORMA — consolidado del holding · Cuenta → Sociedad → Negocio</text>
  <text x="596" y="581" text-anchor="middle" font-size="15" fill="#c7d2fe">Elimina los importes intercompany (ingreso de A = gasto de B) → muestra el <tspan font-weight="700" fill="#ffffff">neto real del grupo</tspan></text>

  <!-- legend -->
  <line x1="820" y1="120" x2="855" y2="120" stroke="#4f46e5" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="862" y="124" font-size="13" fill="#475569">interno (intercompany)</text>
  <line x1="820" y1="146" x2="855" y2="146" stroke="#16a34a" stroke-width="2.5"/>
  <text x="862" y="150" font-size="13" fill="#475569">externo (factura al cliente)</text>
</svg>
